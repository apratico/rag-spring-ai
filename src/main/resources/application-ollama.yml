# Activate with:  --spring.profiles.active=ollama
# Requires:
#   ollama pull llama3.1
#   ollama pull nomic-embed-text
spring:
  ai:
    # Switch active model providers away from OpenAI
    model:
      chat: ollama
      embedding: ollama

    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.1}
          temperature: 0.2
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

    vectorstore:
      pgvector:
        # nomic-embed-text emits 768-dim vectors; use the alternate store
        dimensions: 768
        table-name: vector_store_ollama
