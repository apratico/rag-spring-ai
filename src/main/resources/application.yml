spring:
  application:
    name: rag-spring-ai

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:ragdb}
    username: ${POSTGRES_USER:rag}
    password: ${POSTGRES_PASSWORD:ragpass}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  docker:
    compose:
      enabled: true
      file: compose.yaml
      lifecycle-management: start_and_stop

  ai:
    # Both openai and ollama starters are on the classpath; pin the active
    # provider so only one ChatModel/EmbeddingModel is instantiated here.
    model:
      chat: openai
      embedding: openai
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: 0.2
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

    # Ollama disabled by default — enabled only under 'ollama' profile
    ollama:
      init:
        pull-model-strategy: never

    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1536
        initialize-schema: false
        schema-name: public
        table-name: vector_store

rag:
  top-k: ${RAG_TOPK:4}
  similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.5}
  chunk-size: ${RAG_CHUNK_SIZE:800}
  samples-location: "classpath:data/samples/*.md"

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.apratico.ragspringai: DEBUG
    org.springframework.ai: INFO
